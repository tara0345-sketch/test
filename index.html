<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>안산교회 모바일 주보</title>
    <link rel="stylesheet" href="https://unpkg.com/swiper/swiper-bundle.min.css" />
    <style>
        body { background-color: #FDF9F1; margin: 0; padding: 0; font-family: sans-serif; }
        .header { text-align: center; padding: 15px; background: white; font-weight: bold; color: #1A365D; border-bottom: 2px solid #E5D9C5; }
        .swiper-container { width: 100%; height: 85vh; background: #F5EFE1; position: relative; }
        .swiper-slide { display: flex; justify-content: center; align-items: center; padding: 10px; box-sizing: border-box; }
        canvas { max-width: 100%; max-height: 100%; border: 1px solid #ddd; box-shadow: 0 4px 10px rgba(0,0,0,0.1); background: white; }
        #loading { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); text-align: center; z-index: 10; color: #1A365D; }
    </style>
</head>
<body>

<div class="header">🕊️ 안산교회 모바일 주보 (8면 전체)</div>

<div class="swiper-container">
    <div id="loading">주보 8면을 불러오는 중... ⏳</div>
    <div class="swiper-wrapper" id="bulletin-slides"></div>
    <div class="swiper-pagination"></div>
    <div class="swiper-button-next"></div>
    <div class="swiper-button-prev"></div>
</div>

<script src="https://unpkg.com/swiper/swiper-bundle.min.js"></script>
<script>
    const sheetUrl = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQAP619mjGoRocR22-JnKQMxDng3n5S6Z5ShfeM89YRjE-gHJe-ubckYrpJjbSHq81sYM_E3CXeSYCC/pub?gid=0&single=true&output=csv";

    fetch(sheetUrl).then(res => res.text()).then(csvText => {
        const match = csvText.match(/(https?:\/\/[^\s,"']+)/);
        if (match) cutAndShow(match[1]);
    });

    function cutAndShow(url) {
        const img = new Image();
        img.crossOrigin = "anonymous";
        img.src = url + "?t=" + new Date().getTime();

        img.onload = function() {
            document.getElementById('loading').style.display = 'none';
            
            // 가로 4칸, 세로 2칸 고정
            const cols = 4;
            const rows = 2;
            const pW = img.width / cols;
            const pH = img.height / rows;

            // [중요] 여기에 총 8개의 좌표가 있어야 합니다!
            const order = [
                { r: 0, c: 3 }, // 1. 표지
                { r: 1, c: 0 }, // 2. 내지1
                { r: 1, c: 1 }, // 3. 내지2
                { r: 1, c: 2 }, // 4. 내지3
                { r: 1, c: 3 }, // 5. 내지4
                { r: 0, c: 0 }, // 6. 상단1
                { r: 0, c: 1 }, // 7. 상단2
                { r: 0, c: 2 }  // 8. 상단3
            ];

            const wrapper = document.getElementById('bulletin-slides');
            wrapper.innerHTML = ''; // 기존 슬라이드 초기화

            order.forEach((pos, index) => {
                const canvas = document.createElement('canvas');
                canvas.width = pW;
                canvas.height = pH;
                const ctx = canvas.getContext('2d');
                
                ctx.drawImage(img, pos.c * pW, pos.r * pH, pW, pH, 0, 0, pW, pH);

                const slide = document.createElement('div');
                slide.className = 'swiper-slide';
                slide.appendChild(canvas);
                wrapper.appendChild(slide);
                console.log((index + 1) + "번째 면 생성 완료");
            });

            // Swiper 재설정
            new Swiper('.swiper-container', {
                pagination: { el: '.swiper-pagination', clickable: true },
                navigation: { nextEl: '.swiper-button-next', prevEl: '.swiper-button-prev' },
                observer: true, // 데이터 변경 감지
                observeParents: true
            });
        };
    }
</script>
</body>
</html>
