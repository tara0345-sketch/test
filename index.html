<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=3.0, user-scalable=yes">
    <title>안산교회 모바일 소식지</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/swiper/swiper-bundle.min.css" />
    <style>
        /* 1. 전체 디자인 테마 */
        body { background-color: #F9FAFC; margin: 0; padding: 0; font-family: 'Noto Sans KR', sans-serif; color: #333; }
        .header { text-align: center; padding: 20px 15px; background: white; font-weight: 700; color: #004D7F; border-bottom: 1px solid #E6E8EB; font-size: 20px; letter-spacing: -0.5px; }
        
        /* 2. 로딩 화면 디자인 */
        #loading-screen { text-align: center; padding: 80px 20px; color: #004D7F; font-weight: 700; font-size: 16px; line-height: 1.6; background: #fff; border-bottom: 8px solid #F9FAFC; }
        .spinner { margin: 0 auto 15px; width: 40px; height: 40px; border: 4px solid rgba(0, 77, 127, 0.1); border-top: 4px solid #004D7F; border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* 3. 주보 슬라이드 영역 (처음엔 숨김) */
        .swiper-container { width: 100%; height: 75vh; background: #fff; display: none; }
        .swiper-container.loaded { display: block; animation: fadeIn 0.6s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        
        .swiper-zoom-container { display: flex; justify-content: center; align-items: center; width: 100%; height: 100%; }
        .swiper-slide img { max-width: 95%; max-height: 95%; box-shadow: 0 4px 20px rgba(0,0,0,0.08); border-radius: 6px; background: white; }
        
        /* 4. 하단 섹션 디자인 */
        .section { padding: 30px 20px; background: white; border-bottom: 8px solid #F9FAFC; }
        .section-title { font-size: 19px; font-weight: 700; color: #004D7F; margin-bottom: 20px; display: flex; align-items: center; letter-spacing: -0.5px; }
        .section-title::before { content: "🕊️"; margin-right: 10px; font-size: 20px; }
        
        /* 5. 드롭다운(아코디언) - 텍스트 가운데 정렬 적용 */
        .dropdown-wrapper { margin-top: 10px; border-radius: 10px; overflow: hidden; background-color: #fcfcfc; box-shadow: 0 4px 10px rgba(0,77,127,0.15); }
        .dropdown-header { position: relative; padding: 18px; display: flex; justify-content: center; align-items: center; cursor: pointer; color: white; background: #004D7F; font-weight: 700; font-size: 17px; }
        /* 화살표는 우측에 고정 */
        .dropdown-header::after { content: '▼'; position: absolute; right: 20px; font-size: 12px; transition: 0.3s; color: rgba(255,255,255,0.7); }
        .dropdown-header.active::after { transform: rotate(-180deg); color: white; }
        
        .panel { max-height: 0; overflow: hidden; transition: max-height 0.3s ease-out; background-color: #fff; border-left: 1px solid #E6E8EB; border-right: 1px solid #E6E8EB; border-bottom: 1px solid #E6E8EB; border-bottom-left-radius: 10px; border-bottom-right-radius: 10px; box-sizing: border-box; }
        .panel a { display: block; padding: 18px; color: #555; text-decoration: none; border-bottom: 1px solid #E6E8EB; font-size: 15px; transition: 0.2s; text-align: center; }
        .panel a:last-child { border-bottom: none; }
        .panel a:active { background-color: #F9FAFC; color: #004D7F; font-weight: 700; }
        
        /* 6. 사업장 소개 디자인 */
        .business-card { background: #fff; border: 1px solid #E6E8EB; padding: 20px; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.03); }
        .business-card h3 { margin: 0 0 12px 0; color: #004D7F; font-size: 18px; font-weight: 700; letter-spacing: -0.5px; }
        .business-card p { margin: 0; font-size: 14px; color: #666; line-height: 1.6; font-weight: 300; }
    </style>
</head>
<body>

<div class="header">안산교회 모바일 소식지</div>

<div id="loading-screen">
    <div class="spinner"></div>
    주보를 읽어오는 중입니다...<br><span style="font-size: 13px; color: #888; font-weight: 300;">잠시만 기다려 주세요 ⏳</span>
</div>

<div class="swiper-container" id="main-swiper">
    <div class="swiper-wrapper" id="bulletin-slides"></div>
    <div class="swiper-pagination"></div>
    <div class="swiper-button-next"></div>
    <div class="swiper-button-prev"></div>
</div>

<div class="section">
    <div class="section-title">소식 및 바로가기</div>
    
    <div class="dropdown-wrapper">
        <div class="dropdown-header">안산교회 유튜브 링크모음</div>
        <div class="panel">
            <a href="https://www.youtube.com/playlist?list=PLADscL7WFTv7Fzcn9hYcIldyjm-HLGSkb" target="_blank">📺 1. 안산교회 말씀 다시듣기</a>
            <a href="https://www.youtube.com/@%EC%83%9D%EB%AA%85%EC%9D%98%EB%A7%90%EC%94%80%EC%84%A0%EA%B5%90%ED%9A%8C%EC%95%88%EC%82%B0" target="_blank">🎥 2. 안산교회 유튜브 채널</a>
            <a href="https://ansan.jbch.org/index.php?flag=1&chId=89" target="_blank">🌐 3. 안산교회 홈페이지</a>
            <a href="https://www.jbch.org/ko/" target="_blank">🌐 4. 생명의 말씀 선교회</a>
        </div>
    </div>
</div>

<div class="section">
    <div class="section-title">성도 사업장 소개</div>
    <div class="business-card" id="business-container">
        <h3 id="biz-title">🏢 데이터를 불러오는 중...</h3>
        <p id="biz-desc">잠시만 기다려주세요.</p>
        <p id="biz-info" style="margin-top: 15px; font-size: 13px; color: #999; font-weight: 300;"></p>
    </div>
</div>

<div class="section" style="padding-bottom: 50px; text-align: center; color: #bbb; font-size: 12px; border-bottom: none; font-weight: 300;">
    ⓒ 안산교회. 모든 성도님을 사랑하고 축복합니다.
</div>

<script src="https://unpkg.com/swiper/swiper-bundle.min.js"></script>
<script>
    // -----------------------------------------
    // 1. 주보 이미지 로딩 및 자르기 로직
    // -----------------------------------------
    const img = new Image();
    img.src = "jubo.jpg"; 

    img.onload = async function() {
        const cols = 4; const rows = 2;
        const pW = img.width / cols; const pH = img.height / rows;
        const scale = 3; 

        const order = [
            { r: 0, c: 3 }, { r: 1, c: 0 }, { r: 1, c: 1 }, { r: 1, c: 2 },
            { r: 1, c: 3 }, { r: 0, c: 0 }, { r: 0, c: 1 }, { r: 0, c: 2 }
        ];

        const wrapper = document.getElementById('bulletin-slides');

        const promises = order.map(pos => {
            return new Promise(resolve => {
                const canvas = document.createElement('canvas');
                canvas.width = pW * scale; canvas.height = pH * scale;
                const ctx = canvas.getContext('2d');
                
                ctx.imageSmoothingEnabled = true;
                ctx.imageSmoothingQuality = 'high';
                
                ctx.drawImage(img, pos.c * pW, pos.r * pH, pW, pH, 0, 0, pW * scale, pH * scale);
                
                canvas.toBlob(blob => {
                    const blobUrl = URL.createObjectURL(blob);
                    const slide = `<div class="swiper-slide"><div class="swiper-zoom-container"><img src="${blobUrl}"></div></div>`;
                    resolve(slide);
                }, 'image/jpeg', 1.0); 
            });
        });

        const slides = await Promise.all(promises);
        wrapper.innerHTML = slides.join('');
        
        // 작업이 끝나면 로딩창을 숨기고 주보를 스르륵 보여줌
        document.getElementById('loading-screen').style.display = 'none';
        document.getElementById('main-swiper').classList.add('loaded');

        new Swiper('.swiper-container', {
            zoom: { maxRatio: 4 }, 
            pagination: { el: '.swiper-pagination', clickable: true },
            navigation: { nextEl: '.swiper-button-next', prevEl: '.swiper-button-prev' }
        });
    };

    // -----------------------------------------
    // 2. 드롭다운(아코디언) 메뉴 동작 로직
    // -----------------------------------------
    const dropdownHeader = document.querySelector(".dropdown-header");
    dropdownHeader.addEventListener("click", function() {
        this.classList.toggle("active");
        const panel = this.nextElementSibling;
        if (panel.style.maxHeight) {
            panel.style.maxHeight = null;
        } else {
            panel.style.maxHeight = panel.scrollHeight + "px";
        }
    });

    // -----------------------------------------
    // 3. 스프레드시트에서 사업장 정보 가져오기
    // -----------------------------------------
    const sheetUrl = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQAP619mjGoRocR22-JnKQMxDng3n5S6Z5ShfeM89YRjE-gHJe-ubckYrpJjbSHq81sYM_E3CXeSYCC/pub?gid=0&single=true&output=csv";

    fetch(sheetUrl).then(res => res.text()).then(csvText => {
        // 특정 키워드(항목) 옆에 있는 내용을 찾아오는 똑똑한 함수
        const getVal = (keyword) => {
            const regex = new RegExp(`^.*?${keyword}.*?,(.*)$`, 'm');
            const match = csvText.match(regex);
            return match ? match[1].trim().replace(/^"|"$/g, '') : '';
        };

        const name = getVal('상호명') || '만나 식당';
        const owner = getVal('성도명') || '홍길동 성도님';
        const desc = getVal('소개') || '정성을 다해 만든 식당입니다.';
        const loc = getVal('위치') || '안산시 상록구';
        const phone = getVal('연락처') || '010-0000-0000';

        document.getElementById('biz-title').innerText = `🏢 ${name} (${owner})`;
        document.getElementById('biz-desc').innerText = desc;
        document.getElementById('biz-info').innerHTML = `📍 위치: ${loc}<br>📞 문의: ${phone}`;
    }).catch(e => {
        document.getElementById('biz-title').innerText = "🏢 사업장 안내";
        document.getElementById('biz-desc').innerText = "이번 주 사업장 소식이 준비 중입니다.";
    });
</script>
</body>
</html>
