<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=3.0, user-scalable=yes">
    <title>안산교회 모바일 소식지</title>
    <link rel="stylesheet" href="https://unpkg.com/swiper/swiper-bundle.min.css" />
    <style>
        body { background-color: #FDF9F1; margin: 0; padding: 0; font-family: sans-serif; color: #333; }
        .header { text-align: center; padding: 15px; background: white; font-weight: bold; color: #1A365D; border-bottom: 1px solid #E5D9C5; }
        
        /* 주보 영역 */
        .swiper-container { width: 100%; height: 75vh; background: #F5EFE1; position: relative; opacity: 0; transition: opacity 0.5s; }
        .swiper-container.loaded { opacity: 1; }
        .swiper-zoom-container { display: flex; justify-content: center; align-items: center; width: 100%; height: 100%; }
        .swiper-slide img { max-width: 95%; max-height: 95%; box-shadow: 0 4px 15px rgba(0,0,0,0.1); border-radius: 4px; background: white; }
        
        /* 하단 추가 섹션들 */
        .section { padding: 25px 20px; background: white; border-bottom: 8px solid #FDF9F1; }
        .section-title { font-size: 19px; font-weight: bold; color: #1A365D; margin-bottom: 15px; display: flex; align-items: center; }
        .section-title::before { content: "🕊️"; margin-right: 8px; }
        
        .btn { display: block; width: 100%; padding: 15px; margin: 10px 0; background: #1A365D; color: white; text-align: center; text-decoration: none; border-radius: 8px; font-weight: bold; box-sizing: border-box; }
        .btn-red { background: #FF0000; }
        .btn-green { background: #4CAF50; }
        
        .account-box { background: #f9f9f9; border: 1px solid #ddd; padding: 15px; border-radius: 8px; text-align: center; }
        .account-num { font-size: 18px; font-weight: bold; margin: 10px 0; display: block; }
    </style>
</head>
<body>

<div class="header">안산교회 모바일 소식지</div>

<div class="swiper-container" id="main-swiper">
    <div class="swiper-wrapper" id="bulletin-slides"></div>
    <div class="swiper-pagination"></div>
    <div class="swiper-button-next"></div>
    <div class="swiper-button-prev"></div>
</div>

<div class="section">
    <div class="section-title">온라인 헌금 안내</div>
    <div class="account-box">
        <span class="account-num" id="acc-num">농협 123-4567-8901-23</span>
        <small>예금주: 안산교회</small>
        <button class="btn" style="padding:10px; font-size:14px;" onclick="copyAcc()">계좌번호 복사하기</button>
    </div>
</div>

<div class="section">
    <div class="section-title">예배 및 기도</div>
    <a href="#" class="btn btn-red">유튜브 설교 다시보기 ▶</a>
    <a href="#" class="btn btn-green">기도 제목 및 전도 부탁 남기기 📝</a>
</div>

<div class="section" style="padding-bottom: 50px; text-align: center; color: #888; font-size: 12px;">
    ⓒ 안산교회. 모든 성도님을 사랑하고 축복합니다.
</div>

<script src="https://unpkg.com/swiper/swiper-bundle.min.js"></script>
<script>
    const sheetUrl = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQAP619mjGoRocR22-JnKQMxDng3n5S6Z5ShfeM89YRjE-gHJe-ubckYrpJjbSHq81sYM_E3CXeSYCC/pub?gid=0&single=true&output=csv";

    fetch(sheetUrl).then(res => res.text()).then(csvText => {
        const match = csvText.match(/(https?:\/\/[^\s,"']+)/);
        if (match) cutAndShow(match[1]);
    });

    async function cutAndShow(url) {
        const img = new Image();
        img.crossOrigin = "anonymous";
        img.src = url + "?t=" + new Date().getTime();

        img.onload = async function() {
            const cols = 4; const rows = 2;
            const pW = img.width / cols; const pH = img.height / rows;
            const scale = 1.5; // 화질과 속도의 타협점 (1.5~2 권장)

            const order = [
                { r: 0, c: 3 }, { r: 1, c: 0 }, { r: 1, c: 1 }, { r: 1, c: 2 },
                { r: 1, c: 3 }, { r: 0, c: 0 }, { r: 0, c: 1 }, { r: 0, c: 2 }
            ];

            const wrapper = document.getElementById('bulletin-slides');

            // 병렬 처리를 통해 속도 향상
            const promises = order.map(pos => {
                return new Promise(resolve => {
                    const canvas = document.createElement('canvas');
                    canvas.width = pW * scale; canvas.height = pH * scale;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, pos.c * pW, pos.r * pH, pW, pH, 0, 0, pW * scale, pH * scale);
                    
                    // blob 방식이 toDataURL보다 훨씬 빠름
                    canvas.toBlob(blob => {
                        const blobUrl = URL.createObjectURL(blob);
                        const slide = `<div class="swiper-slide"><div class="swiper-zoom-container"><img src="${blobUrl}"></div></div>`;
                        resolve(slide);
                    }, 'image/jpeg', 0.85);
                });
            });

            const slides = await Promise.all(promises);
            wrapper.innerHTML = slides.join('');
            
            // 완료 후 슬라이더 보이기
            document.getElementById('main-swiper').classList.add('loaded');

            new Swiper('.swiper-container', {
                zoom: { maxRatio: 3 },
                pagination: { el: '.swiper-pagination', clickable: true },
                navigation: { nextEl: '.swiper-button-next', prevEl: '.swiper-button-prev' }
            });
        };
    }

    function copyAcc() {
        const num = document.getElementById('acc-num').innerText;
        navigator.clipboard.writeText(num).then(() => alert("계좌번호가 복사되었습니다."));
    }
</script>
</body>
</html>
