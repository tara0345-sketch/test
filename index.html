<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=3.0, user-scalable=yes">
    <title>안산교회 모바일 소식지</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/swiper/swiper-bundle.min.css" />
    <style>
        /* [오프닝 영상 스타일] */
        #opening-container {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: black; z-index: 10000; 
            display: flex; justify-content: center; align-items: center;
            overflow: hidden; transition: opacity 0.5s ease; 
        }
        #opening-video { width: 100%; height: 100%; object-fit: cover; background: black; }

        /* [메인 콘텐츠 스타일] */
        #main-content { display: none; opacity: 0; transition: opacity 0.5s ease; }
        #main-content.show { display: block; opacity: 1; }

        /* 1. 전체 디자인 테마 */
        body { background-color: #F9FAFC; margin: 0; padding: 0; font-family: 'Noto Sans KR', sans-serif; color: #333; }
        .header { text-align: center; padding: 20px 15px; background: white; font-weight: 700; color: #004D7F; border-bottom: 1px solid #E6E8EB; font-size: 20px; letter-spacing: -0.5px; }
        
        /* 2. 로딩 화면 디자인 */
        #loading-screen { text-align: center; padding: 80px 20px; color: #004D7F; font-weight: 700; font-size: 16px; line-height: 1.6; background: #fff; border-bottom: 8px solid #F9FAFC; }
        .spinner { margin: 0 auto 15px; width: 40px; height: 40px; border: 4px solid rgba(0, 77, 127, 0.1); border-top: 4px solid #004D7F; border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* 3. 메인 주보 슬라이드 영역 */
        .swiper-container { position: relative; width: 100%; height: 75vh; background: #fff; display: none; padding-bottom: 25px; box-sizing: border-box; }
        .swiper-container.loaded { display: block; animation: fadeIn 0.6s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        
        .swiper-pagination { bottom: 5px !important; z-index: 10; }
        .swiper-pagination-bullet-active { background: #004D7F; }
        .swiper-button-next, .swiper-button-prev { color: #004D7F; transform: scale(0.6); }

        .swiper-zoom-container { display: flex; justify-content: center; align-items: center; width: 100%; height: 100%; cursor: pointer; }
        .swiper-slide img { max-width: 95%; max-height: 95%; box-shadow: 0 4px 20px rgba(0,0,0,0.08); border-radius: 6px; background: white; }
        
        /* 4. 공통 섹션 디자인 */
        .section { padding: 30px 20px; background: white; border-bottom: 8px solid #F9FAFC; }
        .section-title { font-size: 19px; font-weight: 700; color: #004D7F; margin-bottom: 20px; display: flex; align-items: center; letter-spacing: -0.5px; }
        .section-title::before { content: "🕊️"; margin-right: 10px; font-size: 20px; }
        
        /* 스크롤 애니메이션 클래스 */
        .reveal { opacity: 0; transform: translateY(40px); transition: all 0.8s cubic-bezier(0.25, 0.46, 0.45, 0.94); }
        .reveal.active { opacity: 1; transform: translateY(0); }

        /* 5. 일정표 디자인 */
        .schedule-box { background: #fff; border: 1px solid #E6E8EB; border-radius: 10px; overflow: hidden; box-shadow: 0 4px 10px rgba(0,77,127,0.05); }
        .schedule-row { display: flex; border-bottom: 1px solid #E6E8EB; }
        .schedule-col { flex: 1; padding: 15px; text-align: center; cursor: pointer; transition: background 0.2s; }
        .schedule-col:first-child { border-right: 1px solid #E6E8EB; }
        .schedule-col:active { background: #f0f4f8; }
        .schedule-label { font-weight: 700; color: #004D7F; margin-bottom: 10px; font-size: 15px; }
        .schedule-img-thumb { width: 100%; height: auto; border-radius: 4px; box-shadow: 0 2px 6px rgba(0,0,0,0.1); display: block; }
        .schedule-hint { font-size: 12px; color: #888; text-align: center; margin-top: 10px; display: flex; justify-content: center; align-items: center; }
        
        /* 6. 전체화면 팝업(모달) - 이제 주보 전용으로만 사용됨 */
        #bulletin-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 9999; flex-direction: column; justify-content: center; }
        .close-btn { position: absolute; top: 15px; right: 20px; color: white; font-size: 30px; font-weight: bold; cursor: pointer; z-index: 10000; padding: 10px; }
        .modal-nav { color: white !important; }
        .modal-pagination .swiper-pagination-bullet { background: rgba(255,255,255,0.4); }
        .modal-pagination .swiper-pagination-bullet-active { background: white; }

        /* 7. 드롭다운 및 사업장 디자인 */
        .dropdown-wrapper { border-radius: 10px; overflow: hidden; background-color: #fcfcfc; box-shadow: 0 4px 10px rgba(0,77,127,0.15); }
        .dropdown-header { position: relative; padding: 18px; display: flex; justify-content: center; align-items: center; cursor: pointer; color: white; background: #004D7F; font-weight: 700; font-size: 17px; }
        .dropdown-header::after { content: '▼'; position: absolute; right: 20px; font-size: 12px; transition: 0.3s; color: rgba(255,255,255,0.7); }
        .dropdown-header.active::after { transform: rotate(-180deg); color: white; }
        .panel { max-height: 0; overflow: hidden; transition: max-height 0.3s ease-out; background-color: #fff; border-left: 1px solid #E6E8EB; border-right: 1px solid #E6E8EB; border-bottom: 1px solid #E6E8EB; border-bottom-left-radius: 10px; border-bottom-right-radius: 10px; box-sizing: border-box; }
        .panel a { display: block; padding: 18px; color: #555; text-decoration: none; border-bottom: 1px solid #E6E8EB; font-size: 15px; transition: 0.2s; text-align: center; }
        .panel a:last-child { border-bottom: none; }
        
        .business-card { background: #fff; border: 1px solid #E6E8EB; padding: 20px; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.03); }
        .business-card h3 { margin: 0 0 12px 0; color: #004D7F; font-size: 18px; font-weight: 700; letter-spacing: -0.5px; }
        .business-card p { margin: 0; font-size: 14px; color: #666; line-height: 1.6; font-weight: 300; }
    </style>
</head>
<body>

<div id="opening-container">
    <video id="opening-video" autoplay muted playsinline preload="auto">
        <source src="jubo_opening.mp4" type="video/mp4">
        웹브라우저가 영상을 지원하지 않습니다.
    </video>
</div>

<div id="main-content">
    <div class="header">안산교회 모바일 소식지</div>

    <div id="loading-screen">
        <div class="spinner"></div>
        주보를 불러오는 중입니다...<br><span style="font-size: 13px; color: #888; font-weight: 300;">잠시만 기다려 주세요 ⏳</span>
    </div>

    <div id="bulletin-hint" style="display: none; text-align: center; padding: 20px 15px 5px; background: white; font-weight: 700; color: #004D7F; font-size: 15px;">
        👆 이미지를 터치하시면 전체화면으로 볼 수 있습니다.
    </div>

    <div class="swiper-container" id="main-swiper">
        <div class="swiper-wrapper" id="bulletin-slides"></div>
        <div class="swiper-pagination"></div>
        <div class="swiper-button-next"></div>
        <div class="swiper-button-prev"></div>
    </div>

    <div class="section reveal">
        <div class="section-title">교회 일정표</div>
        <div class="schedule-box">
            <div class="schedule-row">
                <div class="schedule-col" onclick="window.open('this.jpg', '_blank')">
                    <div class="schedule-label">이달의 일정표</div>
                    <img src="this.jpg" class="schedule-img-thumb" alt="이달의 일정" onerror="this.src='https://via.placeholder.com/300x400.png?text=업데이트+대기중'">
                </div>
                <div class="schedule-col" onclick="window.open('next.jpg', '_blank')">
                    <div class="schedule-label">다음달 일정표</div>
                    <img src="next.jpg" class="schedule-img-thumb" alt="다음달 일정" onerror="this.src='https://via.placeholder.com/300x400.png?text=업데이트+대기중'">
                </div>
            </div>
            <div class="schedule-col" style="border-right: none;" onclick="window.open('year.jpg', '_blank')">
                <div class="schedule-label">2026 연간 일정표</div>
                <img src="year.jpg" class="schedule-img-thumb" alt="연간 일정" onerror="this.src='https://via.placeholder.com/800x300.png?text=업데이트+대기중'">
            </div>
        </div>
        <div class="schedule-hint">👆 이미지를 터치하시면 가장 선명한 원본을 보실 수 있습니다.</div>
    </div>

    <div class="section reveal">
        <div class="section-title">소식 및 바로가기</div>
        <div class="dropdown-wrapper">
            <div class="dropdown-header">안산교회 링크 모음</div>
            <div class="panel">
                <a href="https://www.youtube.com/@%EC%83%9D%EB%AA%85%EC%9D%98%EB%A7%90%EC%94%80%EC%84%A0%EA%B5%90%ED%9A%8C%EC%95%88%EC%82%B0" target="_blank">🎥 1. 안산교회 유튜브 채널</a>
                <a href="https://ansan.jbch.org/index.php?flag=1&chId=89" target="_blank">🌐 2. 안산교회 홈페이지</a>
                <a href="https://www.jbch.org/ko/" target="_blank">🌐 3. 생명의 말씀 선교회</a>
            </div>
        </div>
    </div>

    <div class="section reveal">
        <div class="section-title">성도 사업장 소개</div>
        <div class="business-card" id="business-container">
            <h3 id="biz-title">🏢 데이터를 불러오는 중...</h3>
            <p id="biz-desc">잠시만 기다려주세요.</p>
            <p id="biz-info" style="margin-top: 15px; font-size: 13px; color: #999; font-weight: 300;"></p>
        </div>
    </div>

    <div class="section reveal" style="padding-bottom: 50px; text-align: center; color: #bbb; font-size: 12px; border-bottom: none; font-weight: 300;">
        ⓒ 안산교회. 모든 성도님을 사랑하고 축복합니다.
    </div>

    <div id="bulletin-modal">
        <div class="close-btn" onclick="closeBulletinModal()">✕</div>
        <div class="swiper-container" id="bulletin-modal-swiper" style="display: block; background: transparent; height: 100%; padding-bottom: 0;">
            <div class="swiper-wrapper" id="bulletin-modal-wrapper"></div>
            <div class="swiper-pagination modal-pagination" style="bottom: 20px !important;"></div>
            <div class="swiper-button-next modal-nav"></div>
            <div class="swiper-button-prev modal-nav"></div>
        </div>
    </div>
</div>

<script src="https://unpkg.com/swiper/swiper-bundle.min.js"></script>
<script>
    const video = document.getElementById('opening-video');
    const container = document.getElementById('opening-container');
    const mainContent = document.getElementById('main-content');

    video.onended = function() {
        container.style.opacity = '0';
        setTimeout(function() {
            container.style.display = 'none';
            mainContent.classList.add('show');
            loadJubo(); 
            initScrollAnimation();
        }, 500); 
    };

    let fallbackTimer = setTimeout(function() {
        if (container.style.display !== 'none') { video.onended(); }
    }, 10000); 

    video.onerror = function() { video.onended(); };

    let bulletinImages = []; 

    function loadJubo() {
        const img = new Image();
        img.src = "jubo.jpg"; 

        img.onload = async function() {
            const cols = 4; const rows = 2;
            const pW = img.width / cols; const pH = img.height / rows;
            const scale = 3; 

            const order = [
                { r: 0, c: 3 }, { r: 1, c: 0 }, { r: 1, c: 1 }, { r: 1, c: 2 },
                { r: 1, c: 3 }, { r: 0, c: 0 }, { r: 0, c: 1 }, { r: 0, c: 2 }
            ];

            const wrapper = document.getElementById('bulletin-slides');
            const promises = order.map((pos, index) => {
                return new Promise(resolve => {
                    const canvas = document.createElement('canvas');
                    canvas.width = pW * scale; canvas.height = pH * scale;
                    const ctx = canvas.getContext('2d');
                    ctx.imageSmoothingEnabled = true; ctx.imageSmoothingQuality = 'high';
                    ctx.drawImage(img, pos.c * pW, pos.r * pH, pW, pH, 0, 0, pW * scale, pH * scale);
                    
                    canvas.toBlob(blob => {
                        const blobUrl = URL.createObjectURL(blob);
                        bulletinImages[index] = blobUrl; 
                        resolve(`<div class="swiper-slide" onclick="openBulletinModal(${index})"><div class="swiper-zoom-container"><img src="${blobUrl}"></div></div>`);
                    }, 'image/jpeg', 1.0); 
                });
            });

            const slides = await Promise.all(promises);
            wrapper.innerHTML = slides.join('');
            
            document.getElementById('loading-screen').style.display = 'none';
            document.getElementById('bulletin-hint').style.display = 'block'; 
            document.getElementById('main-swiper').classList.add('loaded');

            new Swiper('#main-swiper', {
                pagination: { el: '#main-swiper .swiper-pagination', clickable: true },
                navigation: { nextEl: '#main-swiper .swiper-button-next', prevEl: '#main-swiper .swiper-button-prev' }
            });
        };
    }

    function initScrollAnimation() {
        const observer = new IntersectionObserver((entries) => {
            entries.forEach((entry) => {
                if (entry.isIntersecting) {
                    entry.target.classList.add('active');
                    observer.unobserve(entry.target);
                }
            });
        }, { threshold: 0.15 });

        const revealElements = document.querySelectorAll('.reveal');
        revealElements.forEach((el) => observer.observe(el));
    }

    let bulletinModalSwiper;
    function openBulletinModal(startIndex) {
        const wrapper = document.getElementById('bulletin-modal-wrapper');
        if (wrapper.innerHTML === '') {
            wrapper.innerHTML = bulletinImages.map(url => 
                `<div class="swiper-slide" style="background: transparent;"><div class="swiper-zoom-container"><img src="${url}" style="max-width: 100%; max-height: 90vh; border-radius: 0;"></div></div>`
            ).join('');
        }
        document.getElementById('bulletin-modal').style.display = 'flex';
        if (!bulletinModalSwiper) {
            bulletinModalSwiper = new Swiper('#bulletin-modal-swiper', {
                initialSlide: startIndex, zoom: { maxRatio: 4 },
                pagination: { el: '#bulletin-modal-swiper .swiper-pagination', clickable: true },
                navigation: { nextEl: '#bulletin-modal-swiper .swiper-button-next', prevEl: '#bulletin-modal-swiper .swiper-button-prev' },
                observer: true, observeParents: true
            });
        } else {
            bulletinModalSwiper.slideTo(startIndex, 0); bulletinModalSwiper.zoom.out(); bulletinModalSwiper.update();
        }
    }
    function closeBulletinModal() { document.getElementById('bulletin-modal').style.display = 'none'; if (bulletinModalSwiper) bulletinModalSwiper.zoom.out(); }
    
    const dropdownHeader = document.querySelector(".dropdown-header");
    dropdownHeader.addEventListener("click", function() { this.classList.toggle("active"); const panel = this.nextElementSibling; if (panel.style.maxHeight) { panel.style.maxHeight = null; } else { panel.style.maxHeight = panel.scrollHeight + "px"; } });
    
    const sheetUrl = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQAP619mjGoRocR22-JnKQMxDng3n5S6Z5ShfeM89YRjE-gHJe-ubckYrpJjbSHq81sYM_E3CXeSYCC/pub?gid=0&single=true&output=csv";
    fetch(sheetUrl).then(res => res.text()).then(csvText => { const getVal = (keyword) => { const match = csvText.match(new RegExp(`^.*?${keyword}.*?,(.*)$`, 'm')); return match ? match[1].trim().replace(/^"|"$/g, '') : ''; }; document.getElementById('biz-title').innerText = `🏢 ${getVal('상호명')||'만나 식당'} (${getVal('성도명')||'홍길동'})`; document.getElementById('biz-desc').innerText = getVal('소개')||'환영합니다.'; document.getElementById('biz-info').innerHTML = `📍 위치: ${getVal('위치')||'-'}<br>📞 문의: ${getVal('연락처')||'-'}`; }).catch(e => { document.getElementById('biz-title').innerText = "🏢 사업장 안내"; document.getElementById('biz-desc').innerText = "준비 중입니다."; });
</script>
</body>
</html>
