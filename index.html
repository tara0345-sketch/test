<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>안산교회 모바일 주보</title>
    <link rel="stylesheet" href="https://unpkg.com/swiper/swiper-bundle.min.css" />
    <style>
        body { background-color: #FDF9F1; margin: 0; padding: 0; font-family: sans-serif; }
        .header { text-align: center; padding: 15px; background: white; font-weight: bold; color: #1A365D; border-bottom: 2px solid #E5D9C5; }
        .swiper-container { width: 100%; height: 85vh; background: #F5EFE1; position: relative; }
        .swiper-slide { display: flex; justify-content: center; align-items: center; padding: 10px; box-sizing: border-box; }
        canvas { max-width: 100%; max-height: 100%; box-shadow: 0 4px 10px rgba(0,0,0,0.15); border-radius: 4px; }
        .swiper-pagination-bullet-active { background: #1A365D; }
        .swiper-button-next, .swiper-button-prev { color: #1A365D; }
        #loading { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); text-align: center; z-index: 10; color: #1A365D; }
    </style>
</head>
<body>

<div class="header">🕊️ 안산교회 모바일 주보</div>

<div class="swiper-container">
    <div id="loading">주보를 불러오고 있습니다... ⏳</div>
    <div class="swiper-wrapper" id="bulletin-slides"></div>
    <div class="swiper-pagination"></div>
    <div class="swiper-button-next"></div>
    <div class="swiper-button-prev"></div>
</div>

<script src="https://unpkg.com/swiper/swiper-bundle.min.js"></script>
<script>
    // 1. 스프레드시트 CSV 주소
    const sheetUrl = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQAP619mjGoRocR22-JnKQMxDng3n5S6Z5ShfeM89YRjE-gHJe-ubckYrpJjbSHq81sYM_E3CXeSYCC/pub?gid=0&single=true&output=csv";

    fetch(sheetUrl)
        .then(response => response.text())
        .then(csvText => {
            // 정규표현식 수정: 주소 끝에 따옴표(")나 공백이 있어도 순수 주소만 추출
            const urlRegex = /(https?:\/\/[^\s,"']+)/;
            const match = csvText.match(urlRegex);
            
            if (match) {
                const imageUrl = match[1];
                console.log("찾은 이미지 주소:", imageUrl);
                cutAndShowImage(imageUrl);
            } else {
                document.getElementById('loading').innerText = "스프레드시트에서 링크를 찾을 수 없습니다.";
            }
        })
        .catch(err => {
            document.getElementById('loading').innerText = "데이터 로드 실패";
        });

    function cutAndShowImage(url) {
        const img = new Image();
        
        // 중요: 보안(CORS) 문제를 해결하기 위해 주소 뒤에 시간을 붙여 캐시를 방지하고 권한 설정
        img.crossOrigin = "anonymous"; 
        img.src = url + "?t=" + new Date().getTime(); 

        img.onload = function() {
            document.getElementById('loading').style.display = 'none';
            const pieceWidth = img.width / 3;
            const pieceHeight = img.height / 2;

            // 주보 읽는 순서
            const readingOrder = [
                { r: 0, c: 2 }, { r: 1, c: 0 }, { r: 1, c: 1 },
                { r: 1, c: 2 }, { r: 0, c: 0 }, { r: 0, c: 1 }
            ];

            const wrapper = document.getElementById('bulletin-slides');
            readingOrder.forEach(pos => {
                const canvas = document.createElement('canvas');
                canvas.width = pieceWidth;
                canvas.height = pieceHeight;
                const ctx = canvas.getContext('2d');
                ctx.drawImage(img, pos.c * pieceWidth, pos.r * pieceHeight, pieceWidth, pieceHeight, 0, 0, pieceWidth, pieceHeight);

                const slide = document.createElement('div');
                slide.className = 'swiper-slide';
                slide.appendChild(canvas);
                wrapper.appendChild(slide);
            });

            new Swiper('.swiper-container', {
                pagination: { el: '.swiper-pagination', clickable: true },
                navigation: { nextEl: '.swiper-button-next', prevEl: '.swiper-button-prev' }
            });
        };

        img.onerror = function() {
            document.getElementById('loading').innerHTML = "이미지를 불러올 수 없습니다.<br>주소를 다시 확인해주세요.";
        };
    }
</script>
</body>
</html>
